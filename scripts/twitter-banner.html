<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0e27; width: 1500px; height: 500px; overflow: hidden; font-family: 'Cinzel', serif; }
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Noto+Sans+Devanagari:wght@700&display=swap');

  .banner {
    width: 1500px;
    height: 500px;
    position: relative;
    background: radial-gradient(ellipse at 30% 50%, #1a1040 0%, #0a0e27 60%, #060818 100%);
    overflow: hidden;
  }

  /* Sacred geometry pattern */
  .yantra {
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(circle at 25% 25%, rgba(212, 168, 83, 0.04) 1px, transparent 1px),
      radial-gradient(circle at 75% 75%, rgba(212, 168, 83, 0.03) 1px, transparent 1px),
      radial-gradient(circle at 50% 50%, rgba(212, 168, 83, 0.02) 1px, transparent 1px);
    background-size: 40px 40px, 30px 30px, 60px 60px;
  }

  /* Stars */
  .stars {
    position: absolute;
    inset: 0;
  }
  .star {
    position: absolute;
    border-radius: 50%;
    background: white;
  }

  /* Zodiac wheel — left side */
  .wheel-container {
    position: absolute;
    left: -50px;
    top: 50%;
    transform: translateY(-50%);
    width: 480px;
    height: 480px;
  }

  /* Gold accent line */
  .gold-line {
    position: absolute;
    top: 50%;
    left: 460px;
    right: 80px;
    height: 1px;
    background: linear-gradient(90deg, #d4a853 0%, rgba(212, 168, 83, 0.3) 40%, transparent 100%);
    transform: translateY(-50%);
  }

  /* Text content — right side */
  .content {
    position: absolute;
    right: 80px;
    top: 50%;
    transform: translateY(-50%);
    text-align: right;
  }

  .mantra {
    font-family: 'Noto Sans Devanagari', sans-serif;
    color: rgba(212, 168, 83, 0.5);
    font-size: 14px;
    letter-spacing: 3px;
    margin-bottom: 16px;
  }

  .title {
    font-family: 'Cinzel', serif;
    font-weight: 900;
    font-size: 56px;
    letter-spacing: 4px;
    background: linear-gradient(135deg, #f0d48a, #d4a853, #f0d48a);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
    line-height: 1.1;
  }

  .subtitle {
    font-family: 'Cinzel', serif;
    font-weight: 400;
    font-size: 18px;
    color: rgba(212, 168, 83, 0.6);
    letter-spacing: 6px;
    text-transform: uppercase;
    margin-bottom: 24px;
  }

  .features {
    font-family: -apple-system, sans-serif;
    font-size: 15px;
    color: rgba(230, 226, 216, 0.6);
    letter-spacing: 1px;
    line-height: 1.8;
  }
  .features span {
    color: rgba(240, 212, 138, 0.8);
  }

  .url {
    font-family: 'Cinzel', serif;
    font-size: 16px;
    color: rgba(212, 168, 83, 0.7);
    letter-spacing: 3px;
    margin-top: 20px;
  }

  /* Bottom gold border */
  .bottom-accent {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, #d4a853, #f0d48a, #d4a853, transparent);
  }

  /* Top gold border */
  .top-accent {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(212, 168, 83, 0.3), transparent);
  }
</style>
</head>
<body>
<div class="banner">
  <div class="yantra"></div>

  <!-- Stars scattered across -->
  <div class="stars">
    <div class="star" style="left:10%;top:15%;width:2px;height:2px;opacity:0.7"></div>
    <div class="star" style="left:25%;top:8%;width:1.5px;height:1.5px;opacity:0.5"></div>
    <div class="star" style="left:40%;top:22%;width:1px;height:1px;opacity:0.4"></div>
    <div class="star" style="left:55%;top:12%;width:2px;height:2px;opacity:0.6"></div>
    <div class="star" style="left:65%;top:85%;width:1.5px;height:1.5px;opacity:0.5"></div>
    <div class="star" style="left:75%;top:18%;width:1px;height:1px;opacity:0.3"></div>
    <div class="star" style="left:85%;top:75%;width:2px;height:2px;opacity:0.5"></div>
    <div class="star" style="left:90%;top:30%;width:1.5px;height:1.5px;opacity:0.4"></div>
    <div class="star" style="left:15%;top:80%;width:1px;height:1px;opacity:0.3"></div>
    <div class="star" style="left:50%;top:90%;width:1.5px;height:1.5px;opacity:0.4"></div>
    <div class="star" style="left:35%;top:70%;width:1px;height:1px;opacity:0.5"></div>
    <div class="star" style="left:80%;top:45%;width:2px;height:2px;opacity:0.3"></div>
    <div class="star" style="left:5%;top:50%;width:1px;height:1px;opacity:0.6"></div>
    <div class="star" style="left:70%;top:60%;width:1.5px;height:1.5px;opacity:0.35"></div>
    <div class="star" style="left:45%;top:40%;width:1px;height:1px;opacity:0.45"></div>
  </div>

  <!-- Zodiac wheel SVG -->
  <div class="wheel-container">
    <svg viewBox="0 0 400 400" width="480" height="480" fill="none">
      <defs>
        <radialGradient id="bg">
          <stop offset="0%" stop-color="#1a1f45" stop-opacity="0.4"/>
          <stop offset="100%" stop-color="#0a0e27" stop-opacity="0"/>
        </radialGradient>
      </defs>

      <circle cx="200" cy="200" r="180" fill="url(#bg)"/>

      <!-- Outer ring -->
      <circle cx="200" cy="200" r="175" stroke="#d4a853" stroke-width="1.5" stroke-opacity="0.35"/>
      <!-- Inner ring -->
      <circle cx="200" cy="200" r="130" stroke="#d4a853" stroke-width="0.5" stroke-opacity="0.12"/>
      <!-- Planet track -->
      <circle cx="200" cy="200" r="152" stroke="#d4a853" stroke-width="0.8" stroke-opacity="0.08"/>

      <!-- 12 rashi dividers -->
      <g stroke="#d4a853" stroke-width="0.4" stroke-opacity="0.15">
        <line x1="200" y1="25" x2="200" y2="70"/>
        <line x1="287" y1="47" x2="257" y2="82"/>
        <line x1="347" y1="113" x2="310" y2="133"/>
        <line x1="375" y1="200" x2="330" y2="200"/>
        <line x1="347" y1="288" x2="310" y2="268"/>
        <line x1="287" y1="353" x2="257" y2="318"/>
        <line x1="200" y1="375" x2="200" y2="330"/>
        <line x1="113" y1="353" x2="143" y2="318"/>
        <line x1="53" y1="288" x2="91" y2="268"/>
        <line x1="25" y1="200" x2="70" y2="200"/>
        <line x1="53" y1="113" x2="91" y2="133"/>
        <line x1="113" y1="47" x2="143" y2="82"/>
      </g>

      <!-- Rashi abbreviations -->
      <g font-size="9" fill="#d4a853" fill-opacity="0.45" text-anchor="middle" font-weight="600" font-family="Cinzel, serif">
        <text x="200" y="58">Ari</text>
        <text x="270" y="72">Tau</text>
        <text x="322" y="126">Gem</text>
        <text x="345" y="204">Can</text>
        <text x="322" y="280">Leo</text>
        <text x="270" y="336">Vir</text>
        <text x="200" y="352">Lib</text>
        <text x="130" y="336">Sco</text>
        <text x="78" y="280">Sag</text>
        <text x="55" y="204">Cap</text>
        <text x="78" y="126">Aqu</text>
        <text x="130" y="72">Pis</text>
      </g>

      <!-- Element-colored segment dots -->
      <circle cx="200" cy="41" r="2.5" fill="#FF6B35" fill-opacity="0.35"/><!-- Fire Aries -->
      <circle cx="282" cy="60" r="2.5" fill="#50C878" fill-opacity="0.3"/><!-- Earth Taurus -->
      <circle cx="340" cy="118" r="2.5" fill="#6B8DD6" fill-opacity="0.3"/><!-- Air Gemini -->
      <circle cx="360" cy="200" r="2.5" fill="#B0BEC5" fill-opacity="0.3"/><!-- Water Cancer -->
      <circle cx="340" cy="282" r="2.5" fill="#FF6B35" fill-opacity="0.3"/><!-- Fire Leo -->
      <circle cx="282" cy="340" r="2.5" fill="#50C878" fill-opacity="0.25"/><!-- Earth Virgo -->
      <circle cx="200" cy="360" r="2.5" fill="#6B8DD6" fill-opacity="0.25"/><!-- Air Libra -->
      <circle cx="118" cy="340" r="2.5" fill="#B0BEC5" fill-opacity="0.25"/><!-- Water Scorpio -->
      <circle cx="60" cy="282" r="2.5" fill="#FF6B35" fill-opacity="0.25"/><!-- Fire Sag -->
      <circle cx="40" cy="200" r="2.5" fill="#50C878" fill-opacity="0.25"/><!-- Earth Cap -->
      <circle cx="60" cy="118" r="2.5" fill="#6B8DD6" fill-opacity="0.25"/><!-- Air Aqua -->
      <circle cx="118" cy="60" r="2.5" fill="#B0BEC5" fill-opacity="0.25"/><!-- Water Pisces -->

      <!-- Planet dots -->
      <circle cx="307" cy="93" r="8" fill="#FFD700" fill-opacity="0.12"/>
      <circle cx="307" cy="93" r="5" fill="#FFD700" stroke="#0a0e27" stroke-width="1"/>

      <circle cx="115" cy="70" r="7" fill="#6B8DD6" fill-opacity="0.1"/>
      <circle cx="115" cy="70" r="4.5" fill="#6B8DD6" stroke="#0a0e27" stroke-width="1"/>

      <circle cx="348" cy="200" r="6" fill="#DC143C" fill-opacity="0.1"/>
      <circle cx="348" cy="200" r="4" fill="#F87171" stroke="#0a0e27" stroke-width="1"/>

      <circle cx="238" cy="42" r="6" fill="#FF69B4" fill-opacity="0.1"/>
      <circle cx="238" cy="42" r="4" fill="#FF69B4" stroke="#0a0e27" stroke-width="1"/>

      <circle cx="90" cy="105" r="5" fill="#B8860B" fill-opacity="0.1"/>
      <circle cx="90" cy="105" r="3.5" fill="#B8860B" stroke="#0a0e27" stroke-width="1"/>

      <!-- Center earth cross -->
      <circle cx="200" cy="200" r="18" fill="none" stroke="#d4a853" stroke-opacity="0.15" stroke-width="0.8"/>
      <line x1="200" y1="185" x2="200" y2="215" stroke="#d4a853" stroke-opacity="0.15" stroke-width="0.6"/>
      <line x1="185" y1="200" x2="215" y2="200" stroke="#d4a853" stroke-opacity="0.15" stroke-width="0.6"/>
    </svg>
  </div>

  <!-- Gold accent line -->
  <div class="gold-line"></div>

  <!-- Text content -->
  <div class="content">
    <div class="mantra">तमसो मा ज्योतिर्गमय</div>
    <div class="title">DEKHO<br>PANCHANG</div>
    <div class="subtitle">Vedic Astrology</div>
    <div class="features">
      Panchang <span>·</span> Kundali <span>·</span> Muhurta <span>·</span> Matching<br>
      Transits <span>·</span> Dashas <span>·</span> Yogas <span>·</span> Learning
    </div>
    <div class="url">dekhopanchang.com</div>
  </div>

  <div class="top-accent"></div>
  <div class="bottom-accent"></div>
</div>
</body>
</html>
