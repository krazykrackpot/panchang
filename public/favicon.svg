<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f0d48a"/>
      <stop offset="50%" stop-color="#d4a853"/>
      <stop offset="100%" stop-color="#8a6d2b"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="45%">
      <stop offset="0%" stop-color="#d4a853" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0a0e27" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="#0a0e27"/>
  <circle cx="16" cy="15" r="14" fill="url(#glow)"/>
  <!-- ॐ symbol — bold, centered -->
  <text x="16" y="22" text-anchor="middle" font-size="22" font-weight="bold" fill="url(#g)" font-family="serif">ॐ</text>
  <!-- Small decorative dot above -->
