name: precompute-nightly

# ─────────────────────────────────────────────────────────────────────
# WHY GH ACTIONS AND NOT VERCEL CRON JOBS
#
# The vercel-plugin validator (and Vercel docs in general) recommend
# Vercel Cron Jobs for scheduled tasks. This job is the deliberate
# exception. The entire architectural purpose of the precompute
# pipeline is to move the choghadiya/panchang compute OFF Vercel —
# that's how we drop the $69/mo Fluid Active CPU line. Running the
# precompute on Vercel Cron would put exactly that compute back on
# Vercel's invocation budget, defeating the migration.
#
# Vercel Cron is right for in-band Function triggers that read/write
# Vercel-resident state (eg. a daily Postgres sweep). It is NOT right
# for batch jobs whose whole point is to externalise CPU work.
#
# This workflow runs on GitHub-hosted Ubuntu runners — GitHub's
# CPU, not ours.
# ─────────────────────────────────────────────────────────────────────
#
# Architecture (2026-06-14 rewrite, updated 2026-06-16): 10 precompute
# targets run as PARALLEL jobs that all depend on a single setup job,
# plus a final revalidate job that depends on all of them. Total
# wall-clock time is bounded by the slowest single target (one of the
# muhurta-month-2026 / muhurta-month-2027 pair, ~65 min worst-case)
# instead of the sum of all targets (~3.3 hours previously).
#
# Background — why the rewrite:
#   - PR #692 introduced engine-hash Blob prefixing. Existing Blobs
#     under the old prefix became unreachable on the new path, so
#     --skip-if-present found zero existing entries → full backfill
#     required for every target.
#   - Combined with the 57-city extension (PR #693) and 4 new targets
#     added over PRs #693-#697, the sequential pipeline hit the 2h
#     job-level ceiling and got cancelled mid-daily-article on the
#     2026-06-14 run.
#   - Parallel jobs eliminate the cumulative-runtime problem entirely.
#     Each job has its own runner + its own timeout. Setup work
#     (checkout, setup-node, npm ci) duplicates per job — ~1 min
#     overhead per — but parallelizes, so adds nothing to wall-clock.
#
# Three secrets must be set in the repo (Settings → Secrets → Actions):
#
#   BLOB_READ_WRITE_TOKEN          @vercel/blob credential. Provision
#                                  via `vercel blob create` then copy
#                                  the read-write token.
#   PRECOMPUTE_REVALIDATE_SECRET   Shared secret matching the env var
#                                  on Vercel. Used as the bearer token
#                                  when posting the cache-flip request.
#   PRECOMPUTE_TARGET_URL          The production base URL where the
#                                  revalidate webhook lives. Typically
#                                  `https://dekhopanchang.com`.
#
# Failure mode: if a single precompute target's job fails (timeout,
# script crash), the rest of the pipeline keeps going — the revalidate
# job uses `if: always()` so it runs regardless. Page handlers fall
# back to live compute on missing Blobs, so a partial-success run
# still produces a usable site.

on:
  schedule:
    # 04:00 UTC daily — single cron is enough for choghadiya which is
    # date-deterministic. Once we add more routes the cron list grows.
    - cron: '0 4 * * *'
  workflow_dispatch:
    # Manual trigger for the initial backfill and any ad-hoc reruns.
    inputs:
      window_days:
        description: 'Future-window days to precompute (default 60)'
        required: false
        default: '60'
      backfill_days:
        description: 'Past-window days to backfill (default 0 = none)'
        required: false
        default: '0'

permissions:
  contents: read

jobs:
  # ───────────────────────────────────────────────────────────────────
  # Setup — resolves dates + cities once, exposes them as job outputs
  # the parallel precompute jobs consume. Cheap (~30 sec) so per-target
  # duplication of checkout+npm-ci is the only real overhead from the
  # parallel architecture.
  # ───────────────────────────────────────────────────────────────────
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      dates: ${{ steps.window.outputs.dates }}
      cities: ${{ steps.cities.outputs.cities }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Resolve window dates
        id: window
        env:
          WINDOW_DAYS: ${{ github.event.inputs.window_days || '60' }}
          BACKFILL_DAYS: ${{ github.event.inputs.backfill_days || '0' }}
        run: |
          DATES=$(python3 - <<'PY'
          import os, datetime as dt
          backfill = int(os.environ["BACKFILL_DAYS"])
          window   = int(os.environ["WINDOW_DAYS"])
          today    = dt.datetime.utcnow().date()
          start    = today - dt.timedelta(days=backfill)
          end      = today + dt.timedelta(days=window)
          out = []
          d = start
          while d <= end:
              out.append(d.isoformat())
              d += dt.timedelta(days=1)
          print(",".join(out))
          PY
          )
          echo "dates=$DATES" >> "$GITHUB_OUTPUT"
          echo "Computed $(echo "$DATES" | tr ',' '\n' | wc -l) dates"

      - name: Resolve cities
        id: cities
        run: |
          # Derive the city list from the canonical CITIES module so
          # a typo in this YAML can't list a slug the engine doesn't
          # know. 57 cities total (IST + diaspora).
          CITIES=$(npx tsx -e "
            import { CITIES } from './src/lib/constants/cities';
            console.log(CITIES.map(c => c.slug).join(','));
          ")
          if [ -z "$CITIES" ]; then
            echo "::error::Resolved empty city list from CITIES constant"
            exit 1
          fi
          echo "cities=$CITIES" >> "$GITHUB_OUTPUT"
          echo "Resolved $(echo "$CITIES" | tr ',' '\n' | wc -l) cities from CITIES module"

  # ───────────────────────────────────────────────────────────────────
  # Per-target precompute jobs — all run in parallel after setup.
  # Each has its own per-job timeout sized to its worst-case backfill.
  # ───────────────────────────────────────────────────────────────────

  choghadiya:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '24', cache: 'npm' }
      - run: npm ci --no-audit --no-fund
      - name: Precompute choghadiya
        env:
          PRECOMPUTE_STORAGE: blob
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
        run: |
          npx tsx scripts/precompute/choghadiya.ts \
            --dates "${{ needs.setup.outputs.dates }}" \
            --cities "${{ needs.setup.outputs.cities }}" \
            --skip-if-present

  gauri-panchang:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '24', cache: 'npm' }
      - run: npm ci --no-audit --no-fund
      - name: Precompute gauri-panchang
        env:
          PRECOMPUTE_STORAGE: blob
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
        run: |
          npx tsx scripts/precompute/gauri-panchang.ts \
            --dates "${{ needs.setup.outputs.dates }}" \
            --cities "${{ needs.setup.outputs.cities }}" \
            --skip-if-present

  horoscope:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '24', cache: 'npm' }
      - run: npm ci --no-audit --no-fund
      - name: Precompute horoscope
        env:
          PRECOMPUTE_STORAGE: blob
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
        run: |
          # No cities axis — engine has no location input.
          RASHIS=$(npx tsx -e "
            import { RASHIS } from './src/lib/constants/rashis';
            console.log(RASHIS.map(r => r.slug).join(','));
          ")
          npx tsx scripts/precompute/horoscope.ts \
            --dates "${{ needs.setup.outputs.dates }}" \
            --rashis "$RASHIS" \
            --skip-if-present

  panchang-date:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '24', cache: 'npm' }
      - run: npm ci --no-audit --no-fund
      - name: Precompute panchang-date
        env:
          PRECOMPUTE_STORAGE: blob
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
        run: |
          # SEO cities derived from SEO_CITY_BY_LOCALE inside the script.
          npx tsx scripts/precompute/panchang-date.ts \
            --dates "${{ needs.setup.outputs.dates }}" \
            --skip-if-present

  panchang-city:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '24', cache: 'npm' }
      - run: npm ci --no-audit --no-fund
      - name: Precompute panchang-city
        env:
          PRECOMPUTE_STORAGE: blob
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
        run: |
          npx tsx scripts/precompute/panchang-city.ts \
            --dates "${{ needs.setup.outputs.dates }}" \
            --cities "${{ needs.setup.outputs.cities }}" \
            --skip-if-present

  daily-article:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '24', cache: 'npm' }
      - run: npm ci --no-audit --no-fund
      - name: Precompute daily-article
        env:
          PRECOMPUTE_STORAGE: blob
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
        run: |
          npx tsx scripts/precompute/daily-article.ts \
            --dates "${{ needs.setup.outputs.dates }}" \
            --cities "${{ needs.setup.outputs.cities }}" \
            --skip-if-present

  hindu-calendar:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '24', cache: 'npm' }
      - run: npm ci --no-audit --no-fund
      - name: Precompute hindu-calendar
        env:
          PRECOMPUTE_STORAGE: blob
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
        run: |
          npx tsx scripts/precompute/hindu-calendar.ts \
            --years "2026,2027" \
            --skip-if-present

  festivals-year:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '24', cache: 'npm' }
      - run: npm ci --no-audit --no-fund
      - name: Precompute festivals-year
        env:
          PRECOMPUTE_STORAGE: blob
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
        run: |
          npx tsx scripts/precompute/festivals-year.ts \
            --years "2026,2027" \
            --cities "${{ needs.setup.outputs.cities }}" \
            --skip-if-present

  # muhurta-month split per-year so a single job's worst-case backfill
  # stays under its own per-job timeout. 2026-06-15 run cancelled at
  # 130 min because the combined 15,048-tuple cold backfill needed
  # ~150-200 min. Each year alone is ~7,524 tuples → ~65-100 min in
  # the worst case, comfortably under the 110-min ceiling.
  # Steady-state with PR #697's exists-check + --skip-if-present:
  # near-zero per cron run.
  muhurta-month-2026:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 110
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '24', cache: 'npm' }
      - run: npm ci --no-audit --no-fund
      - name: Precompute muhurta-month (2026)
        env:
          PRECOMPUTE_STORAGE: blob
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
        run: |
          npx tsx scripts/precompute/muhurta-month.ts \
            --years "2026" \
            --cities "${{ needs.setup.outputs.cities }}" \
            --skip-if-present

  muhurta-month-2027:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 110
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '24', cache: 'npm' }
      - run: npm ci --no-audit --no-fund
      - name: Precompute muhurta-month (2027)
        env:
          PRECOMPUTE_STORAGE: blob
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
        run: |
          npx tsx scripts/precompute/muhurta-month.ts \
            --years "2027" \
            --cities "${{ needs.setup.outputs.cities }}" \
            --skip-if-present

  # ───────────────────────────────────────────────────────────────────
  # Revalidate — runs after every precompute job, regardless of success.
  # Even if some Blobs are missing, page handlers fall back to live
  # compute so flipping the cache layers is always safe.
  # ───────────────────────────────────────────────────────────────────
  revalidate:
    needs:
      - setup
      - choghadiya
      - gauri-panchang
      - horoscope
      - panchang-date
      - panchang-city
      - daily-article
      - hindu-calendar
      - festivals-year
      - muhurta-month-2026
      - muhurta-month-2027
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '24', cache: 'npm' }
      - run: npm ci --no-audit --no-fund

      - name: Revalidate page paths
        env:
          DATES: ${{ needs.setup.outputs.dates }}
          CITIES: ${{ needs.setup.outputs.cities }}
          PRECOMPUTE_REVALIDATE_SECRET: ${{ secrets.PRECOMPUTE_REVALIDATE_SECRET }}
          PRECOMPUTE_TARGET_URL: ${{ secrets.PRECOMPUTE_TARGET_URL }}
        run: |
          # Both Next.js cache layers must flip together for a Blob
          # rewrite to produce fresh content:
          #
          #   paths[] → revalidatePath → Full Route Cache (page HTML/RSC)
          #   tags[]  → updateTag      → Data Cache (the inner fetch in
          #                              VercelBlobStorage.get)
          #
          # NARROWED to today±1 since PR #692. The full 60-day forward
          # window doesn't need flipping — future dates haven't been
          # cached yet, so the first natural ISR render after the Blob
          # write produces fresh content with no revalidate call needed.
          # ISR Writes line on Vercel bill is the primary cost surface
          # this narrowing addresses.

          REVALIDATE_JSON=$(python3 - <<PY
          import json, os, datetime as dt
          all_dates = os.environ["DATES"].split(",")
          today = dt.date.today()
          flip_dates = {(today - dt.timedelta(days=1)).isoformat(),
                        today.isoformat(),
                        (today + dt.timedelta(days=1)).isoformat()}
          dates = [d for d in all_dates if d in flip_dates]
          cities = os.environ["CITIES"].split(",")
          # SEO cities for panchang-date — one per visible locale,
          # deduped. Must match scripts/precompute/panchang-date.ts
          # which derives the same set from SEO_CITY_BY_LOCALE.
          seo_cities = sorted(set([
              "delhi",    # en
              "ujjain",   # hi
              "mumbai",   # mr
              "chennai",  # ta
              "hyderabad",# te
              "kolkata",  # bn
              "vadodara", # gu
              "bangalore",# kn
              "darbhanga",# mai
          ]))
          locales = ["en", "hi", "ta", "te", "bn", "gu", "kn", "mai", "mr"]
          # /panchang/[city] uses "today in city.timezone" as the
          # implicit date — no [date] segment in the URL. Tag-flip
          # only; the 6h ISR handles the page cache.
          # hindu-calendar + festivals-year aren't path-flipped either;
          # yearly fan-out and the 7d/86400 revalidate handle it.
          paths = (
              [f"/{l}/choghadiya/{d}" for d in dates for l in locales]
              + [f"/{l}/gauri-panchang/{d}" for d in dates for l in locales]
              + [f"/{l}/panchang/date/{d}" for d in dates for l in locales]
              + [f"/{l}/daily/{d}/{c}" for d in dates for l in locales for c in cities]
          )
          this_year = dt.date.today().year
          tags = (
              [f"precompute:choghadiya/{d}/{c}" for d in dates for c in cities]
              + [f"precompute:gauri-panchang/{d}/{c}" for d in dates for c in cities]
              + [f"precompute:panchang-date/{d}/{c}" for d in dates for c in seo_cities]
              + [f"precompute:panchang-city/{d}/{c}" for d in dates for c in cities]
              + [f"precompute:daily-article/{d}/{c}" for d in dates for c in cities]
              + [f"precompute:hindu-calendar/{this_year}"]
              + [f"precompute:festivals-year/{this_year}/{c}" for c in cities]
          )
          print(json.dumps({"paths": paths, "tags": tags}))
          PY
          )

          # Print counts without dumping the whole lists to the log.
          python3 -c "
          import json, sys
          j = json.loads(sys.stdin.read())
          print(f'Posting {len(j[\"paths\"])} paths and {len(j[\"tags\"])} tags to revalidate')
          " <<< "$REVALIDATE_JSON"

          curl --fail-with-body --silent --show-error \
               -X POST "${PRECOMPUTE_TARGET_URL}/api/precompute/revalidate" \
               -H "authorization: Bearer ${PRECOMPUTE_REVALIDATE_SECRET}" \
               -H "content-type: application/json" \
               -d "${REVALIDATE_JSON}"

  # ───────────────────────────────────────────────────────────────────
  # Notify on failure — opens a GitHub issue if any precompute job
  # (or revalidate) failed. Previously silent failures sat for days
  # before we noticed in the bill: 2026-06-11/12/13 runs all hit
  # "Argument list too long" on the revalidate step and were
  # invisible until the daily Vercel rate spiked.
  #
  # Uses the default GITHUB_TOKEN — no external secrets required.
  # The issue body links to the failed run; assignee is the repo
  # owner so it surfaces in the dashboard inbox.
  # ───────────────────────────────────────────────────────────────────
  notify-failure:
    needs:
      - setup
      - choghadiya
      - gauri-panchang
      - horoscope
      - panchang-date
      - panchang-city
      - daily-article
      - hindu-calendar
      - festivals-year
      - muhurta-month-2026
      - muhurta-month-2027
      - revalidate
    # `if: failure()` doesn't fire reliably across a graph where the
    # downstream revalidate job runs with `if: always()` and succeeds —
    # the chain's terminal state ends up "ok" even when an upstream
    # precompute job failed. `contains(needs.*.result, 'failure')`
    # inspects the result of every needed job directly. The 2026-06-15
    # cron's muhurta-month job failed but no issue was opened with
    # the prior `if: failure()` trigger.
    if: ${{ !cancelled() && contains(needs.*.result, 'failure') }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const date = new Date().toISOString().slice(0, 10);
            const title = `precompute-nightly: failure on ${date}`;
            const body = [
              `One or more jobs in the precompute-nightly workflow failed on ${date}.`,
              '',
              `**Run**: ${runUrl}`,
              '',
              `**Failed jobs** (see run for details):`,
              `- setup: ${{ needs.setup.result }}`,
              `- choghadiya: ${{ needs.choghadiya.result }}`,
              `- gauri-panchang: ${{ needs.gauri-panchang.result }}`,
              `- horoscope: ${{ needs.horoscope.result }}`,
              `- panchang-date: ${{ needs.panchang-date.result }}`,
              `- panchang-city: ${{ needs.panchang-city.result }}`,
              `- daily-article: ${{ needs.daily-article.result }}`,
              `- hindu-calendar: ${{ needs.hindu-calendar.result }}`,
              `- festivals-year: ${{ needs.festivals-year.result }}`,
              `- muhurta-month-2026: ${{ needs.muhurta-month-2026.result }}`,
              `- muhurta-month-2027: ${{ needs.muhurta-month-2027.result }}`,
              `- revalidate: ${{ needs.revalidate.result }}`,
              '',
              'Triage: page handlers fall back to live compute on missing Blobs, so the',
              'site continues to work — but Vercel CPU drifts up while the failure',
              'persists. Fix the failed job and re-run via `gh workflow run',
              'precompute-nightly.yml`.',
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['cron-failure', 'precompute'],
            });
