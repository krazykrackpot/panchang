name: Daily YouTube Short

# ╔══════════════════════════════════════════════════════════════════╗
# ║  TITLE RULE: Every daily Short title MUST contain "Today" or   ║
# ║  "आज" AND the date. Shorts with "Today" get 2-3x more views.  ║
# ║                                                                ║
# ║  Pattern: "{Topic} Today {Date} — {Hook}" #Shorts              ║
# ║  Good:  "Rahu Kaal Today 12 May — 1:30–3:00 PM"               ║
# ║  Bad:   "Understanding Rahu Kaal and Its Effects"              ║
# ║                                                                ║
# ║  Title templates live in: scripts/post-youtube-short.ts        ║
# ║  Fallback title lives in: src/lib/youtube/generate-short.ts    ║
# ║  Rashifal title lives in: scripts/daily-rashifal-video.ts      ║
# ╚══════════════════════════════════════════════════════════════════╝

on:
  schedule:
    # 01:00 UTC = 06:30 IST — after the Twitter panchang post (00:30 UTC)
    - cron: '0 1 * * *'
  workflow_dispatch: # Manual trigger from GitHub UI

jobs:
  post-short:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # Post every day — content variation (themes, audio, titles, transitions)
      # is sufficient to avoid the "programmatic upload" signal.
      # Random delay below ensures posting time varies daily.

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install ffmpeg
        uses: FedericoCarboni/setup-ffmpeg@v3

      - name: Random delay (0-10 minutes)
        run: |
          DELAY=$((RANDOM % 600))
          echo "Sleeping ${DELAY}s (~$((DELAY / 60))m) before generating..."
          sleep $DELAY

      - name: Generate and upload YouTube Short
        env:
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: npx tsx scripts/post-youtube-short.ts
