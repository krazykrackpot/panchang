      - generic [ref=e89]:
        - heading "What is Muhurta — The Vedic Science of Auspicious Timing" [level=2] [ref=e90]
        - paragraph [ref=e91]: "Muhurta (electional astrology) is the branch of Jyotish Shastra dedicated to selecting the most favourable moment for initiating important actions. The foundational principle is simple yet profound: time is not neutral. The Vedic tradition holds that Kaal (Time) is the supreme force — every moment carries a unique energetic signature shaped by the positions of the Sun, Moon, and planets. A marriage begun under an auspicious muhurta inherits the cosmic support of that moment; a business launched during Vishti Karana or Rahu Kaal inherits their obstruction."
        - generic [ref=e92]:
          - generic [ref=e93]:
            - heading "The Five Elements of Muhurta (Panchanga Shuddhi)" [level=3] [ref=e94]
            - paragraph [ref=e95]: A muhurta is evaluated through five simultaneous lenses, collectively called Panchanga Shuddhi. Tithi (lunar day) — each of the 30 tithis per month has a ruling deity and intrinsic quality. Nanda tithis (1, 6, 11) favour joyful occasions; Bhadra tithis (2, 7, 12) suit prosperity-oriented acts. Nakshatra (lunar mansion) — the 27 nakshatras are classified as Fixed, Movable, Sharp, Soft, or Mixed, each suited to different activities. Deva nakshatras like Pushya and Revati are universally auspicious. Yoga — the 27 nitya yogas arise from the combined longitude of Sun and Moon. Siddhi, Amrita, and Shubha yogas amplify success; Vyatipata and Vaidhriti are avoided. Karana (half-tithi) — 11 karanas rotate through each lunar month. Vishti (Bhadra) karana is universally inauspicious. Vara (weekday) — each day is ruled by a graha. Thursday (Guru) and Friday (Shukra) are broadly favourable; Saturday and Tuesday require careful evaluation.
          - generic [ref=e96]:
            - heading "Classical Scriptural Basis" [level=3] [ref=e97]
            - paragraph [ref=e98]: The primary texts for muhurta selection are the Muhurta Chintamani by Rama Daivagya and the Muhurta Martanda by Narayana Daivagya. These 16th-17th century treatises codify rules from earlier sources including the Brihat Samhita of Varahamihira and the Kalaprakashika. They define specific conditions for each type of activity — marriage requires a fixed nakshatra on a Monday, Wednesday, Thursday, or Friday with Shukla Paksha tithi, for instance — and enumerate hundreds of special yogas (Sarvartha Siddhi, Amrita Siddhi, Ravi Yoga) that enhance or diminish a window.
          - generic [ref=e99]:
            - heading "How Our AI Scoring Engine Works" [level=3] [ref=e100]
            - paragraph [ref=e101]: "Our engine evaluates every 90-minute window within your selected date range across 20+ activities. Each window receives a composite score (0-100) computed from four weighted dimensions: Panchang quality (tithi + nakshatra + yoga + karana + vara alignment for the specific activity), Transit strength (current positions of Jupiter, Saturn, Rahu, Ketu relative to your birth chart), Timing factors (hora lord, choghadiya quality, absence of Rahu Kaal, Yamaghanda, and Gulika Kaal), and Personal compatibility (Tara Bala and Chandra Bala from your birth nakshatra, if provided). The weights shift by activity type: marriage prioritises nakshatra and tithi; travel prioritises vara and hora."
          - generic [ref=e102]:
            - heading "What Makes a Good Muhurta" [level=3] [ref=e103]
            - paragraph [ref=e104]: A well-chosen muhurta combines the presence of positive factors with the absence of negative ones. The engine checks for Rahu Kaal (the 90-minute daily window ruled by Rahu — universally avoided for new beginnings), Vishti Karana (Bhadra — the inauspicious half-tithi that recurs 8 times per lunar month), Panchaka dosha (five-fold affliction when Moon transits Dhanishtha through Revati), Gandanta zones (junctional degrees between water and fire signs where Moon is vulnerable), and combustion or retrogression of key planets. When all five panchanga elements are clean and no negative windows overlap, the result is a Sarva Shuddhi muhurta — the highest quality.
